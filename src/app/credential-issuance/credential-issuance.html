<div class="container">
  <h1>Issuance</h1>
    <!--
  <app-holder-keys-card></app-holder-keys-card>
  -->
  <div fxLayout="row"
    fxLayoutAlign="center center"
    class="content">
    <mat-card appearance="none">
      <mat-card-title fxLayout.gt-xs="row"
        fxLayout.xs="column">
        <h3>Resolve Verifiable Credential</h3>
      </mat-card-title>
      <mat-card-content>
        <app-deeplink-input [inputSignal]="sdJwt"
          (submitEvent)="onResolve($event)"
          (resetEvent)="onClear()"
          label="swiyu://..." />

        <mat-accordion>
          <app-metadata-panel [data]="deeplink()"
            [panelOpenState]="panelOpenState"
            [errorMessage]="metadataError()"
            panelTitle="Resolving Deeplink">
            <app-json-viewer [data]="deeplink()" />
          </app-metadata-panel>
          <app-metadata-panel [data]="metadata()"
            [panelOpenState]="panelOpenState"
            [errorMessage]="openidError()"
            panelTitle="Resolving Metadata">
            <mat-list>
              <app-checklist-entry [data]="metadata()"
                [validData]="metadata() !== undefined"
                text="Can resolve metadata" />
              <app-checklist-entry [data]="metadata()"
                [validData]="metadata()?.credential_endpoint  !== undefined"
                text="Is credential_endpoint present?" />
              <app-checklist-entry [data]="credentialConfig()"
                [validData]="credentialConfig() !== undefined"
                text="Is offered credentialConfig present in metadata?" />
            </mat-list>
            <app-json-viewer [data]="metadata()" />
          </app-metadata-panel>
          <app-metadata-panel [data]="credentialConfig()"
            [panelOpenState]="panelOpenState"
            panelTitle="Extract credential metadata">
            <mat-list>
              <app-checklist-entry [data]="credentialConfig()"
                [validData]="credentialConfig()?.format === 'vc+sd-jwt' || credentialConfig()?.format === 'dc+sd-jwt' "
                text="Is format correct?" />
              <app-checklist-entry [data]="credentialConfig()?.cryptographic_binding_methods_supported"
                [validData]="credentialConfig()?.cryptographic_binding_methods_supported?.includes('jwk')"
                text="Is cryptographic_binding_methods_supported correct? -> must be 'jwk'" />
              <app-checklist-entry [data]="credentialConfig()?.credential_signing_alg_values_supported"
                [validData]="credentialConfig()?.credential_signing_alg_values_supported?.includes('ES256')"
                text="Is credential_signing_alg_values_supported correct? -> must be 'ES256'" />
              <app-checklist-entry
                [data]="credentialConfig()?.proof_types_supported?.jwt?.proof_signing_alg_values_supported[0]"
                [validData]="credentialConfig()?.proof_types_supported?.jwt?.proof_signing_alg_values_supported[0] === 'ES256'"
                text="Is proof_signing_alg_values_supported correct? -> must be 'ES256'" />
              <app-checklist-entry [data]="metadata() && metadata()['nonce_endpoint']"
                [validData]="metadata()?.['nonce_endpoint']  !== undefined"
                text="Is nonce endpoint defined" />
            </mat-list>
            <app-json-viewer [data]="credentialConfig()" />
          </app-metadata-panel>
          <app-metadata-panel [data]="credentialRequestEncryption()"
            [panelOpenState]="panelOpenState"
            panelTitle="Extract credential request encryption">
            <mat-list>
              <app-checklist-entry [data]="credentialRequestEncryption()"
                [validData]="credentialRequestEncryption() !== undefined"
                text="Is credential request encryption defined?" />

              <app-checklist-entry [data]="credentialRequestEncryption()?.encryption_required != null"
                [validData]="credentialRequestEncryption()?.encryption_required === true"
                text="Is credential request encryption required?" />

              <app-checklist-entry [data]="credentialRequestEncryption()?.enc_values_supported"
                [validData]="credentialRequestEncryption()?.enc_values_supported?.includes('A128GCM')"
                text="Does request encryption support A128GCM?" />

              <app-checklist-entry [data]="credentialRequestEncryption()?.jwks"
                [validData]="credentialRequestEncryption()?.jwks?.keys?.length > 0"
                text="Is a JWKS provided for request encryption?" />

              <app-json-viewer [data]="credentialRequestEncryption()" />
            </mat-list>
          </app-metadata-panel>
          <app-metadata-panel [data]="credentialRequestEncryption()"
            [panelOpenState]="panelOpenState"
            panelTitle="Extract credential response encryption">
            <mat-list>
              <app-checklist-entry [data]="credentialResponseEncryption()"
                [validData]="credentialResponseEncryption() !== undefined"
                text="Is credential response encryption defined?" />

              <app-checklist-entry [data]="credentialResponseEncryption()?.encryption_required != null"
                [validData]="credentialResponseEncryption()?.encryption_required === true"
                text="Is credential response encryption required?" />

              <app-checklist-entry [data]="credentialResponseEncryption()?.enc_values_supported"
                [validData]="credentialResponseEncryption()?.enc_values_supported?.includes('A128GCM')"
                text="Does response encryption support A128GCM?" />

              <app-checklist-entry [data]="credentialResponseEncryption()?.alg_values_supported"
                [validData]="credentialResponseEncryption()?.alg_values_supported?.includes('ECDH-ES')"
                text="Does response encryption support ECDH-ES?" />

              <app-json-viewer [data]="credentialResponseEncryption()" />
            </mat-list>
          </app-metadata-panel>
          <app-metadata-panel [data]="openIdConfig()"
            [panelOpenState]="panelOpenState"
            panelTitle="OpenID Config">
            <mat-list>
              <app-checklist-entry [data]="openIdConfig()"
                [validData]="openIdConfig()"
                text="Can openid config be loaded" />
              <app-checklist-entry [data]="openIdConfig()?.issuer"
                [validData]="openIdConfig()?.issuer"
                text="Contains issuer?" />
              <app-checklist-entry [data]="openIdConfig()?.token_endpoint"
                [validData]="openIdConfig()?.token_endpoint"
                text="Contains token_endpoint?" />
            </mat-list>
            <app-json-viewer [data]="openIdConfig()" />
          </app-metadata-panel>
          <app-metadata-panel [data]="tokenResponse()"
            [panelOpenState]="panelOpenState"
            [errorMessage]="tokenError()"
            panelTitle="Access token response">
            <app-json-viewer [data]="tokenResponse()" />
          </app-metadata-panel>
          <app-metadata-panel [data]="nonceResponse()"
            [panelOpenState]="panelOpenState"
            [errorMessage]="nonceError()"
            panelTitle="Get Nonce Response">
            <app-json-viewer [data]="nonceResponse()" />
          </app-metadata-panel>
          <app-metadata-panel [data]="credentialsResponse()"
            [panelOpenState]="panelOpenState"
            [errorMessage]="credentialError()"
            panelTitle="Get Credentials Response">
            <app-json-viewer [data]="credentialsResponse()" />
          </app-metadata-panel>
          <app-metadata-panel [data]="encodedCredential()"
            [panelOpenState]="panelOpenState"
            panelTitle="Credentials">
            <app-json-viewer [data]="encodedCredential()" />
          </app-metadata-panel>
          <mat-accordion>
            <app-metadata-panel [data]="registryEntry()"
              [panelOpenState]="panelOpenState"
              panelTitle="Load registry entry">
              <mat-list>
                <app-checklist-entry [data]="registryEntry()"
                  [validData]="registryEntry()"
                  text="Can resolve metadata" />
              </mat-list>
              @for (item of registryEntry(); track $index) {
              <pre>{{ item | json }}</pre>
              } @empty { Cannot be retrieved }
              <pre>{{ registryEntry }}</pre>
            </app-metadata-panel>

            <app-metadata-panel [data]="decodedHeader()"
              [panelOpenState]="panelOpenState"
              panelTitle="Decode Header">
              <mat-list>
                <app-checklist-entry [data]="decodedHeader()"
                  [validData]="decodedHeader()"
                  text="Header is valid" />
                <app-checklist-entry [data]="decodedHeader()"
                  [validData]="checkIfKeyPresent()"
                  text="Public Key can be resolved from registry entry" />
              </mat-list>
              <app-json-viewer [data]="decodedHeader()" />
            </app-metadata-panel>
          </mat-accordion>
        </mat-accordion>
      </mat-card-content>
    </mat-card>

    <div fxLayout="row"
      fxLayoutAlign="center center"
      class="content">
      <mat-card appearance="none">
        <mat-card-title fxLayout.gt-xs="row"
          fxLayout.xs="column">
          <h3>Credential Details</h3>
        </mat-card-title>
        <mat-card-content>
          <app-credential [registryEntry]="registryEntry()"
            [encodedCredential]="encodedCredential()"></app-credential>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
