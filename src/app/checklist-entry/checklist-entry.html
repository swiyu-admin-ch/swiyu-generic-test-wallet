<mat-list-item class="checklist-entry">

  <mat-icon matListItemIcon
    [fontIcon]="icon()"
    [ngClass]="iconClass()">
  </mat-icon>

  <span matListItemTitle>
    {{ text() }}
  </span>

  @if (optional()) {
    <span matListItemMeta>
      <mat-icon
        fontIcon="help_outline"
        [matTooltip]="optional()!"
        matTooltipPosition="left">
      </mat-icon>
    </span>
  }

</mat-list-item>
