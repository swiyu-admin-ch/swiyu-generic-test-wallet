<mat-card appearance="none">
  <mat-card-header (click)="toggleExpand()" style="cursor: pointer; padding: 0px;">
    <mat-card-title>
      <mat-icon [style.transform]="isExpanded() ? 'rotate(0deg)' : 'rotate(-90deg)'">expand_more</mat-icon>
      Wallet Information
    </mat-card-title>
  </mat-card-header>

  @if (isExpanded()) {
  <mat-card-content>
    <div style="margin-bottom: 16px;">
      <h4 style="margin: 0 0 8px 0; font-size: 12px; text-transform: uppercase; color: #666;">
        Holder Keys
        <button
          mat-icon-button
          (click)="openEphemeralKeysInfo($event)"
          matTooltip="Key information"
          style="width: 20px; height: 20px; line-height: 20px; margin-left: 4px;">
          <mat-icon style="font-size: 14px; width: 14px; height: 14px;">help_outline</mat-icon>
        </button>
      </h4>

      <p style="margin: 4px 0; font-size: 13px;">
        <strong>Generated:</strong> {{ formatDate(holderKeyGeneratedAt()) }}
      </p>
      <p style="margin: 4px 0; font-size: 13px;">
        <strong>Key ID:</strong> <code style="background: #f5f5f5; padding: 2px 4px; border-radius: 2px; font-size: 11px;">{{ getCurrentKeyId() }}</code>
      </p>
    </div>
  </mat-card-content>
  }
</mat-card>
